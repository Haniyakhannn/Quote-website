<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#D88C9A" />
<title>For You</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Quicksand:wght@400;500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="sky" aria-hidden="true">
  <span class="petal p1"></span>
  <span class="petal p2"></span>
  <span class="petal p3"></span>
  <span class="petal p4"></span>
  <span class="petal p5"></span>
  <span class="petal p6"></span>
</div>

<main class="stage">

  <p class="eyebrow" id="dateLabel"></p>

  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open today's note">
      <div class="envelope-back"></div>
      <div class="envelope-flap"></div>
      <div class="note" id="note">
        <p class="note-quote" id="quoteText"></p>
        <p class="note-author" id="authorText"></p>
      </div>
      <div class="envelope-front"></div>
      <div class="heart-seal">♥</div>
    </div>
    <p class="hint" id="hint">tap the envelope</p>
  </div>

  <div class="streak" id="streak"></div>

  <button class="notify-btn" id="notifyBtn" type="button">
    <span id="notifyBtnText">turn on gentle reminders</span>
  </button>

  <p class="footnote">a little note waits for you, every day between 4:00pm–10:30pm</p>

</main>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="quote-data.js"></script>
<script src="app.js"></script>
</body>
</html>
